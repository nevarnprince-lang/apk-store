<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee APK Bar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Comfortaa:wght@500;700&display=swap');
        :root { --latte: #f7f3f0; --cream: #fffcf9; --mocha: #a68b7c; --espresso: #5c4a3c; }
        body { font-family: 'Quicksand', sans-serif; background-color: var(--latte); color: var(--espresso); }
        .heading-font { font-family: 'Comfortaa', cursive; }
        .coffee-card { background: var(--cream); border: 1px solid #e8e1d9; transition: all 0.3s ease; }
        .coffee-card:hover { transform: translateY(-5px); border-color: #d9c5b2; box-shadow: 0 12px 24px rgba(92, 74, 60, 0.05); }
        .btn-brew { background-color: var(--mocha); color: white; border-radius: 99px; transition: 0.3s; }
        .btn-brew:hover { background-color: var(--espresso); transform: scale(1.05); }
    </style>
</head>
<body class="pb-10">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-stone-200 px-6 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
                <span class="text-2xl">☕</span>
                <h1 class="heading-font font-bold text-xl tracking-tight">APK Bar</h1>
            </div>
            <a href="admin.html" class="text-xs font-bold uppercase tracking-widest opacity-60 hover:opacity-100">Staff Only ⚙️</a>
        </div>
    </nav>

    <main id="app-container" class="max-w-5xl mx-auto px-6 mt-10">
        <!-- Content dynamically injected here -->
        <div id="loader" class="text-center py-20 opacity-50">Heating up the machine... ☕</div>
    </main>

    <script>
        const container = document.getElementById('app-container');

        async function fetchApps() {
            try {
                const res = await fetch('api.php?action=getApps');
                const apps = await res.json();
                renderHome(apps);
            } catch (err) {
                container.innerHTML = `<div class="text-center py-20">The coffee machine is broken. Please try again.</div>`;
            }
        }

        function renderHome(apps) {
            if (apps.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-50 font-bold italic">No drinks on the menu yet.</div>`;
                return;
            }

            let html = `<h2 class="heading-font text-3xl font-bold mb-8">Freshly Brewed</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">`;
            
            apps.reverse().forEach(app => {
                html += `
                    <div class="coffee-card rounded-[2.5rem] p-8 flex flex-col items-center text-center cursor-pointer" onclick="showDetail(${app.id})">
                        <img src="${app.icon}" class="w-24 h-24 rounded-[1.8rem] mb-5 bg-white shadow-sm object-cover">
                        <h3 class="font-bold text-lg mb-1 truncate w-full">${app.name}</h3>
                        <p class="text-xs font-bold text-stone-400 uppercase tracking-widest mb-6">${app.dev}</p>
                        <div class="mt-auto bg-stone-100 text-stone-500 text-[10px] font-bold px-4 py-2 rounded-full uppercase tracking-tighter">View Recipe</div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
            window.allApps = apps; // Cache for detail view
        }

        function showDetail(id) {
            const app = window.allApps.find(a => a.id == id);
            let html = `
                <button onclick="fetchApps()" class="mb-8 font-bold text-stone-400 hover:text-stone-800 transition-colors">← Back to Menu</button>
                <div class="bg-white rounded-[3rem] p-10 border border-stone-100 flex flex-col md:flex-row gap-12 items-center md:items-start animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <img src="${app.icon}" class="w-48 h-48 rounded-[2.5rem] shadow-xl object-cover p-2 bg-stone-50">
                    <div class="flex-1 text-center md:text-left">
                        <h1 class="heading-font text-4xl font-bold mb-2">${app.name}</h1>
                        <p class="text-stone-400 font-bold text-xl mb-6">By ${app.dev}</p>
                        <div class="flex flex-wrap justify-center md:justify-start gap-3 mb-10">
                            <span class="bg-stone-50 px-4 py-1 rounded-full text-[10px] font-black uppercase text-stone-400 border border-stone-100">v${app.version}</span>
                            <span class="bg-stone-50 px-4 py-1 rounded-full text-[10px] font-black uppercase text-stone-400 border border-stone-100">${app.size}</span>
                        </div>
                        <a href="${app.apk}" download class="btn-brew px-12 py-4 font-bold text-lg inline-flex items-center gap-2 shadow-lg shadow-stone-200">
                            Download APK 
                        </a>
                    </div>
                </div>
                <div class="mt-12 px-6">
                    <h3 class="heading-font text-xl font-bold mb-4 border-b border-stone-100 pb-2">Description</h3>
                    <p class="text-stone-600 leading-relaxed whitespace-pre-wrap">${app.desc}</p>
                </div>
            `;
            container.innerHTML = html;
            window.scrollTo(0,0);
        }

        window.onload = fetchApps;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee APK Bar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Comfortaa:wght@500;700&display=swap');
        :root { --latte: #f8f6f2; --cream: #fffdfc; --mocha: #a68b7c; --espresso: #5c4a3c; --accent: #d4a373; }
        body { font-family: 'Quicksand', sans-serif; background-color: var(--latte); color: var(--espresso); margin: 0; }
        .heading-font { font-family: 'Comfortaa', cursive; }
        .coffee-card { background: var(--cream); border: 1px solid #eee8e2; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .coffee-card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 15px 30px rgba(92, 74, 60, 0.08); }
        .btn-brew { background-color: var(--mocha); color: white; border-radius: 99px; transition: 0.3s; box-shadow: 0 4px 10px rgba(166, 139, 124, 0.3); padding: 1rem 2.5rem; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 700; }
        .btn-brew:hover { background-color: var(--espresso); transform: scale(1.05); }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-stone-200 px-6 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <span class="text-3xl">☕</span>
                <h1 class="heading-font font-bold text-xl tracking-tight text-stone-800">APK Bar</h1>
            </div>
            <a href="admin.html" class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400 hover:text-stone-800 transition-colors">Staff Only</a>
        </div>
    </nav>

    <main id="app-container" class="max-w-5xl mx-auto px-6 mt-12">
        <div id="loader" class="text-center py-20 opacity-40 font-bold">Grinding beans... ☕</div>
    </main>

    <script>
        const API_URL = 'https://converter.kesug.com/api.php';
        const container = document.getElementById('app-container');

        async function fetchApps() {
            try {
                const res = await fetch(`${API_URL}?action=getApps`);
                const apps = await res.json();
                renderHome(apps);
            } catch (err) {
                container.innerHTML = `<div class="text-center py-20 opacity-50">Could not connect to the coffee machine.</div>`;
            }
        }

        function renderHome(apps) {
            if (!apps || apps.length === 0) {
                container.innerHTML = `<div class="text-center py-20 border-2 border-dashed border-stone-200 rounded-[3rem] text-stone-400 font-bold italic">Menu is empty.</div>`;
                return;
            }

            let html = `<h2 class="heading-font text-3xl font-bold mb-10 text-center md:text-left text-stone-800">The Menu</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">`;
            
            apps.reverse().forEach(app => {
                html += `
                    <div class="coffee-card rounded-[2.5rem] p-8 flex flex-col items-center text-center cursor-pointer group" onclick="showDetail(${app.id})">
                        <img src="${app.icon}" class="w-24 h-24 rounded-[1.8rem] mb-6 shadow-sm object-cover bg-white">
                        <h3 class="font-bold text-lg mb-1 truncate w-full">${app.name}</h3>
                        <p class="text-[10px] font-black text-stone-300 uppercase tracking-widest mb-6">${app.dev}</p>
                        <div class="mt-auto w-full py-2 bg-stone-50 rounded-xl text-[10px] font-black text-stone-400 group-hover:bg-stone-800 group-hover:text-white transition-all">VIEW BREW</div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
            window.allApps = apps;
        }

        function showDetail(id) {
            const app = window.allApps.find(a => a.id == id);
            container.innerHTML = `
                <button onclick="fetchApps()" class="mb-8 font-black text-[10px] uppercase tracking-widest text-stone-400 hover:text-stone-800 transition-colors">← Back</button>
                <div class="bg-white rounded-[3rem] p-8 md:p-12 flex flex-col md:flex-row gap-12 items-center md:items-start shadow-sm border border-stone-100">
                    <img src="${app.icon}" class="w-48 h-48 rounded-[2rem] shadow-xl object-cover">
                    <div class="flex-1 text-center md:text-left">
                        <h1 class="heading-font text-4xl font-bold mb-2 text-stone-800">${app.name}</h1>
                        <p class="text-stone-400 font-bold mb-8">By ${app.dev}</p>
                        <div class="flex justify-center md:justify-start gap-3 mb-10">
                            <span class="bg-stone-50 px-4 py-1.5 rounded-full text-[10px] font-black text-stone-400 border border-stone-100 uppercase tracking-widest">${app.version}</span>
                            <span class="bg-stone-50 px-4 py-1.5 rounded-full text-[10px] font-black text-stone-400 border border-stone-100 uppercase tracking-widest">${app.size}</span>
                        </div>
                        <a href="${app.apk}" download class="btn-brew">Download APK</a>
                    </div>
                </div>
                <div class="mt-12 px-6">
                    <h3 class="heading-font text-xl font-bold mb-4 border-b pb-2 border-stone-100 text-stone-800">Description</h3>
                    <p class="text-stone-500 leading-relaxed whitespace-pre-wrap font-medium">${app.desc}</p>
                </div>
            `;
            window.scrollTo(0,0);
        }

        window.onload = fetchApps;
    </script>
</body>
</html>

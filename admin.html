<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Bar Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Comfortaa:wght@500;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #f8f6f2; color: #5c4a3c; }
        .heading-font { font-family: 'Comfortaa', cursive; }
        .input-coffee { background: white; border: 2px solid #eee8e2; border-radius: 1.2rem; padding: 1rem; width: 100%; transition: 0.3s; font-weight: 600; }
        .input-coffee:focus { border-color: #a68b7c; outline: none; box-shadow: 0 0 0 4px rgba(166, 139, 124, 0.1); }
        .btn-brew { background-color: #a68b7c; color: white; border-radius: 1.2rem; font-weight: 700; width: 100%; padding: 1.2rem; transition: 0.3s; }
        .btn-brew:hover { background-color: #5c4a3c; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="heading-font text-3xl font-bold text-stone-800">Brew Studio</h1>
            <a href="index.html" class="text-stone-400 font-bold hover:text-stone-800">← Back</a>
        </div>

        <div id="status-msg" class="hidden mb-6 p-4 rounded-2xl bg-stone-800 text-white text-center font-bold"></div>

        <form id="upload-form" class="bg-white rounded-[2.5rem] p-8 md:p-10 border border-stone-100 shadow-sm space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" name="name" placeholder="App Name" required class="input-coffee">
                <input type="text" name="dev" placeholder="Developer" required class="input-coffee">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                <input type="text" name="version" placeholder="1.0.0" required class="input-coffee">
                <div class="px-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-stone-400 mb-1 block">App Icon</label>
                    <input type="file" name="icon" accept="image/*" required class="text-xs">
                </div>
            </div>

            <div class="bg-stone-50 border-2 border-dashed border-stone-100 p-6 rounded-2xl text-center">
                <label class="text-[10px] font-black uppercase tracking-widest text-stone-400 mb-2 block">APK File</label>
                <input type="file" name="apk" accept=".apk" required class="text-xs">
            </div>

            <textarea name="desc" placeholder="App Description..." required class="input-coffee h-32 resize-none"></textarea>

            <button type="submit" id="submit-btn" class="btn-brew shadow-lg shadow-stone-100">
                Publish Brew ☕
            </button>
        </form>
    </div>

    <script>
        const API_URL = 'https://converter.kesug.com/api.php';
        const form = document.getElementById('upload-form');
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status-msg');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Steaming... ♨️";
            
            const formData = new FormData(form);
            
            try {
                const res = await fetch(`${API_URL}?action=upload`, {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                
                status.innerText = result.message;
                status.classList.remove('hidden');
                
                if(result.success) {
                    form.reset();
                    setTimeout(() => status.classList.add('hidden'), 3000);
                }
            } catch (err) {
                alert("Upload failed. Make sure api.php has CORS enabled!");
            } finally {
                btn.disabled = false;
                btn.innerText = "Publish Brew ☕";
            }
        };
    </script>
</body>
</html>

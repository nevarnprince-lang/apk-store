<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Bar Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Comfortaa:wght@500;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #f7f3f0; color: #5c4a3c; }
        .heading-font { font-family: 'Comfortaa', cursive; }
        .input-coffee { background: white; border: 2px solid #e8e1d9; border-radius: 1.2rem; padding: 1rem; width: 100%; transition: 0.3s; }
        .input-coffee:focus { border-color: #a68b7c; outline: none; box-shadow: 0 0 0 4px rgba(166, 139, 124, 0.1); }
        .btn-brew { background-color: #a68b7c; color: white; border-radius: 1.2rem; font-weight: bold; width: 100%; padding: 1.2rem; transition: 0.3s; }
        .btn-brew:hover { background-color: #5c4a3c; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-2xl mx-auto mt-10">
        <div class="flex justify-between items-center mb-10">
            <h1 class="heading-font text-3xl font-bold">New Recipe 🖋️</h1>
            <a href="index.html" class="text-stone-400 font-bold hover:text-stone-800">← Back to Menu</a>
        </div>

        <div id="status-msg" class="hidden mb-6 p-4 rounded-2xl bg-stone-800 text-white text-center font-bold"></div>

        <form id="upload-form" class="bg-white rounded-[2.5rem] p-10 border border-stone-100 shadow-sm space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-stone-400 ml-2 mb-2 block">App Name</label>
                    <input type="text" name="name" required class="input-coffee">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-stone-400 ml-2 mb-2 block">Developer</label>
                    <input type="text" name="dev" required class="input-coffee">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-stone-400 ml-2 mb-2 block">Version</label>
                    <input type="text" name="version" required class="input-coffee" placeholder="1.0.0">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-stone-400 ml-2 mb-2 block">App Icon (Image)</label>
                    <input type="file" name="icon" accept="image/*" required class="text-xs mt-2">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black uppercase tracking-widest text-stone-400 ml-2 mb-2 block">APK File</label>
                <div class="bg-stone-50 border-2 border-dashed border-stone-200 p-4 rounded-2xl text-center">
                    <input type="file" name="apk" accept=".apk" required class="text-xs">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black uppercase tracking-widest text-stone-400 ml-2 mb-2 block">Description</label>
                <textarea name="desc" required class="input-coffee h-32 resize-none"></textarea>
            </div>

            <button type="submit" id="submit-btn" class="btn-brew shadow-lg shadow-stone-200">
                Brew and Publish ☕
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('upload-form');
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status-msg');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Steaming... ♨️";
            
            const formData = new FormData(form);
            
            try {
                const res = await fetch('api.php?action=upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                
                status.innerText = result.message;
                status.classList.remove('hidden');
                
                if(result.success) {
                    form.reset();
                    setTimeout(() => status.classList.add('hidden'), 3000);
                }
            } catch (err) {
                alert("The machine clogged. Try again.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Brew and Publish ☕";
            }
        };
    </script>
</body>
</html>
